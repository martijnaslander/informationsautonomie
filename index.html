<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Information Autonomy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gate {
      text-align: center;
      padding: 48px 32px;
      max-width: 360px;
      width: 100%;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }
    p {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: inherit;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #555;
    }
    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 500;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #e0e0e0; }
    .error {
      margin-top: 12px;
      color: #ff6b6b;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="gate">
    <h1>Information Autonomy</h1>
    <p>This site is not public yet.</p>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <button onclick="check()">Enter</button>
    <div class="error" id="err">Incorrect password</div>
  </div>
  <script>
    // Check if already authenticated
    if (sessionStorage.getItem('ia_auth') === '1') {
      window.location.replace('slides.html');
    }

    function check() {
      var pw = document.getElementById('pw').value;
      if (pw === 'open') {
        sessionStorage.setItem('ia_auth', '1');
        window.location.replace('slides.html');
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }

    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') check();
    });
  </script>
</body>
</html>
